<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#163050"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Paint brush -->
  <g transform="translate(32,32) rotate(-35) translate(-32,-32)">
    <!-- Brush handle -->
    <rect x="28" y="34" width="8" height="22" rx="2" fill="#D4A853"/>
    <rect x="29" y="34" width="3" height="22" rx="1" fill="#E0BE78" opacity="0.5"/>
    <!-- Ferrule (metal band) -->
    <rect x="26" y="30" width="12" height="6" rx="1.5" fill="#C0C0C0"/>
    <rect x="26" y="32" width="12" height="1" fill="#A0A0A0"/>
    <!-- Bristles -->
    <path d="M27 30 L27 18 C27 14 30 10 32 8 C34 10 37 14 37 18 L37 30 Z" fill="#2EC4B6"/>
    <path d="M29 30 L29 19 C29 16 31 12 32 10 C33 12 35 16 35 19 L35 30 Z" fill="#3DD9C9" opacity="0.5"/>
    <!-- Paint drip -->
    <circle cx="28" cy="16" r="2.5" fill="#2EC4B6"/>
    <ellipse cx="36" cy="20" rx="2" ry="3" fill="#2EC4B6" opacity="0.7"/>
  </g>
  <!-- PP text -->
  <text x="32" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="7" fill="white" opacity="0.9">PP+</text>
</svg>
